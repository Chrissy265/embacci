server {
    listen 80;
    server_name embacci.com www.embacci.com;

    root /var/www/embacci/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;   # <-- SPA fallback, critical
    }

    # optional: cache the hashed assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
