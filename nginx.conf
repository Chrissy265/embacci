server {
    listen 80;
    server_name embacci.com www.embacci.com;

    root /var/www/embacci/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;   # <-- SPA fallback, critical
    }

    # Build output in /assets/ is content-hashed by Vite (e.g.
    # index-Bop_1Yiq.js, family-BLAY-LFE.jpg). A new content = a new filename,
    # so these can be cached forever as immutable with no stale-cache risk.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # NON-hashed files copied verbatim from public/ (uploads/, favicon, etc.)
    # keep their names across deploys, so they must be revalidated rather than
    # cached as immutable — otherwise a content change would be served stale.
    location /uploads/ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # index.html must never be cached hard — it references the hashed bundle and
    # must always be re-fetched so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
